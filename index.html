<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo a Telegram...</title>
    <script>
        // 1. Capturamos el parámetro "c" de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const canal = urlParams.get('c');
        
        // 2. Definimos una variable vacía para el usuario final
        let telegramUser = "";

        // 3. Asignamos el nombre de usuario de Telegram según el número del parámetro
        if (canal === "1") {
            telegramUser = "HunterSpikeSystem"; // Reemplaza con el usuario sin el @
        } else if (canal === "2") {
            telegramUser = "HunterSpike_Bot";       // Reemplaza con el usuario sin el @
        } else if (canal === "3") {
            telegramUser = "TuCanalLowTicket"; // Reemplaza con el usuario sin el @
        } else {
            telegramUser = "TuCanalPrincipal"; // Canal por defecto por si alguien entra sin el parámetro
        }

        // === LÓGICA DE REDIRECCIÓN ===
        setTimeout(function() {
            window.location.href = "tg://resolve?domain=" + telegramUser;
        }, 500);

        setTimeout(function() {
            window.location.href = "https://t.me/" + telegramUser;
        }, 2500);
    </script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #0088cc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a { color: #0088cc; text-decoration: none; font-weight: bold; font-size: 1.1em; }
        a:hover { text-decoration: underline; }
        p { color: #aaaaaa; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Abriendo Telegram...</h2>
    <p>Si no te redirige automáticamente, <a href="#" id="manual-link">haz clic aquí</a>.</p>
    
    <script>
        document.getElementById('manual-link').href = "tg://resolve?domain=" + telegramUser;
    </script>
</body>
</html>
