<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Spike System | Acceso</title>
    <style>
        :root {
            --cyan: #00f3ff;
            --gold: #ffcf54;
            --green: #25d366;
            --bg: #0a0f16;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* === ANIMACIÓN DE LA FLECHA === */
        .arrow-container {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 70px;
            animation: pulseArrow 1.2s infinite alternate;
            z-index: 10;
        }
        @keyframes pulseArrow {
            0% { transform: translate(-5px, 5px) scale(0.95); filter: drop-shadow(0 0 5px var(--cyan)); }
            100% { transform: translate(5px, -5px) scale(1.05); filter: drop-shadow(0 0 15px var(--cyan)); }
        }
        
        /* === ESTILOS DEL LOGO === */
        .logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid var(--cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6), inset 0 0 20px rgba(0, 243, 255, 0.4);
            margin-top: 50px;
            object-fit: cover;
        }
        
        /* === TIPOGRAFÍA === */
        .title-container {
            text-align: center;
            margin: 20px 0;
        }
        .title-hunter {
            color: var(--gold);
            font-size: 32px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(255, 207, 84, 0.8);
        }
        .title-spike {
            color: var(--cyan);
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 12px rgba(0, 243, 255, 0.8);
        }
        
        /* === CAJA DE INSTRUCCIONES === */
        .warning-box {
            text-align: center;
            margin: 10px 0 30px 0;
            padding: 0 15px;
            max-width: 400px;
        }
        .warning-title {
            color: var(--cyan);
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--cyan);
        }
        .warning-text {
            color: #e6edf3;
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .highlight-gold {
            color: var(--gold);
            font-weight: bold;
        }
        
        /* === BOTONES NEÓN === */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 40px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 1px;
            background-color: rgba(10, 15, 22, 0.8);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        
        .btn-telegram {
            color: var(--cyan);
            border: 2px solid var(--cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3), inset 0 0 10px rgba(0, 243, 255, 0.2);
        }
        .btn-bot {
            color: var(--gold);
            border: 2px solid var(--gold);
            box-shadow: 0 0 15px rgba(255, 207, 84, 0.3), inset 0 0 10px rgba(255, 207, 84, 0.2);
        }
        .btn-wapp {
            color: var(--green);
            border: 2px solid var(--green);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.3), inset 0 0 10px rgba(37, 211, 102, 0.2);
        }
        
        .icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="arrow-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="85" cy="5" r="4" fill="var(--cyan)"/>
            <circle cx="85" cy="18" r="4" fill="var(--cyan)"/>
            <circle cx="85" cy="31" r="4" fill="var(--cyan)"/>
            <path d="M20,90 Q70,80 82,42" fill="none" stroke="var(--cyan)" stroke-width="6" stroke-linecap="round"/>
            <polygon points="70,50 85,35 95,52" fill="var(--cyan)"/>
        </svg>

    <img src="logo.jpg" alt="Logo Hunter" class="logo">

    <div class="title-container">
        <h1 class="title-hunter">HUNTER</h1>

        <p class="warning-text" style="color: var(--cyan);">Selecciona <b>"Abrir con el navegador"</b> para continuar.</p>
    </div>

            SOPORTE WHATSAPP

    </div>

</body>
</html>
