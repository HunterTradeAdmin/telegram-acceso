<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso a Hunter Trade</title>
    <style>
        body {
            background-color: #0d1117; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h2 { margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #8b949e; margin-bottom: 30px; font-size: 1rem; }
        
        /* Diseño de botón estilo Trading/Academia */
        .btn {
            background-color: #24A1DE; /* Azul Telegram */
            color: white;
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn.whatsapp { background-color: #25D366; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
    </style>
</head>
<body>

    <h2>Conectando de forma segura...</h2>
    <p>TikTok bloquea la apertura automática. <br><b>Toca el botón abajo para continuar:</b></p>
    
    <a href="#" id="action-btn" class="btn">Cargando...</a>

    <script>
        // 1. Obtener parámetros de la URL (?c=1, ?c=2, etc)
        const urlParams = new URLSearchParams(window.location.search);
        const canal = urlParams.get('c');
        
        // 2. Detectar si el usuario usa Android o iPhone
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        var isAndroid = /android/i.test(userAgent);
        
        // Variables
        let tgDomain = "HunterSpikeSystem"; // Por defecto canal 1
        let wappPhone = "573026768554";
        let isWapp = false;
        let directLink = "";

        // Lógica de ruteo
        if (canal === "2") {
            tgDomain = "HunterSpike_Bot";
        } else if (canal === "3") {
            isWapp = true;
        }

        // 3. Generar el enlace "rompe-bloqueos"
        if (isWapp) {
            // Configuración para WhatsApp
            document.getElementById('action-btn').innerText = "ABRIR WHATSAPP";
            document.getElementById('action-btn').classList.add('whatsapp');
            
            if (isAndroid) {
                // Intent exclusivo para Android (Fuerza apertura)
                directLink = "intent://send?phone=" + wappPhone + "#Intent;package=com.whatsapp;scheme=whatsapp;end";
            } else {
                // iPhone / Web
                directLink = "whatsapp://send?phone=" + wappPhone;
            }
        } else {
            // Configuración para Telegram
            document.getElementById('action-btn').innerText = "ABRIR TELEGRAM";
            
            if (isAndroid) {
                // Intent exclusivo para Android (Fuerza apertura y burla a TikTok)
                directLink = "intent://resolve?domain=" + tgDomain + "#Intent;package=org.telegram.messenger;scheme=tg;end";
            } else {
                // iPhone / Web
                directLink = "tg://resolve?domain=" + tgDomain;
            }
        }

        // Asignar el enlace al botón manual
        document.getElementById('action-btn').href = directLink;

        // 4. Intentar forzarlo automáticamente en un tiempo muy corto
        setTimeout(function() {
            window.location.href = directLink;
        }, 300);
    </script>

</body>
</html>
