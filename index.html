<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Trade Academy | Enlaces</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0B0E14; /* Fondo oscuro trading */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }
        /* Círculo para tu logo o foto */
        .profile-pic {
            width: 100px;
            height: 100px;
            background-color: #1A202C;
            border: 2px solid #24A1DE;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 20px rgba(36, 161, 222, 0.2);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #8A94A6;
            font-size: 0.95rem;
        }
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            background-color: #1A202C;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.05rem;
            border: 1px solid #2D3748;
            transition: all 0.2s ease;
        }
        .link-btn:active {
            transform: scale(0.98);
        }
        /* Colores específicos para cada botón */
        .btn-telegram {
            border-left: 4px solid #24A1DE;
        }
        .btn-telegram:hover {
            background-color: #141b26;
            border-color: #24A1DE;
        }
        .btn-whatsapp {
            border-left: 4px solid #25D366;
        }
        .btn-whatsapp:hover {
            background-color: #141b26;
            border-color: #25D366;
        }
        .tiktok-warning {
            margin-top: 40px;
            padding: 15px;
            background-color: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            color: #ff8a80;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-pic">🎯</div>
        <h1>Hunter Trade Academy</h1>
        <p class="subtitle">Sistemas y Herramientas Algorítmicas</p>
    </div>

    <div class="links-container">
        <a href="https://t.me/HunterSpikeSystem" target="_blank" class="link-btn btn-telegram">
            Canal Oficial (Hunter Spike)
        </a>

        <a href="https://t.me/HunterSpike_Bot" target="_blank" class="link-btn btn-telegram">
            Hunter Spike Bot
        </a>

        <a href="https://wa.me/573026768554" target="_blank" class="link-btn btn-whatsapp">
            Soporte por WhatsApp
        </a>
    </div>

    <div class="tiktok-warning">
        ¿Un botón no funciona?<br>
        Toca los <b>3 puntos (•••)</b> arriba a la derecha y selecciona <b>"Abrir en el navegador"</b>.
    </div>

</body>
</html>
