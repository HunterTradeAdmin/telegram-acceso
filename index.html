<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo...</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const canal = urlParams.get('c');
        
        let finalUrl = "";
        let directProtocol = "";

        // Configuración de rutas según el parámetro ?c=
        if (canal === "1") {
            // Canal Principal
            finalUrl = "https://t.me/HunterSpikeSystem";
            directProtocol = "tg://resolve?domain=HunterSpikeSystem";
        } else if (canal === "2") {
            // Segundo Canal / Bot
            finalUrl = "https://t.me/HunterSpike_Bot";
            directProtocol = "tg://resolve?domain=HunterSpike_Bot";
        } else if (canal === "3") {
            // WhatsApp Directo
            finalUrl = "https://wa.me/573026768554";
            directProtocol = "https://api.whatsapp.com/send?phone=573026768554";
        } else {
            // Por defecto: Canal Principal
            finalUrl = "https://t.me/HunterSpikeSystem";
            directProtocol = "tg://resolve?domain=HunterSpikeSystem";
        }

        // Intento de apertura directa
        setTimeout(function() {
            window.location.href = directProtocol;
        }, 500);

        // Redirección de respaldo (en caso de que no abra la app)
        setTimeout(function() {
            window.location.href = finalUrl;
        }, 2500);
    </script>
    <style>
        body {
            background-color: #0d1117; /* Fondo oscuro estilo GitHub/Trading */
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            border: 3px solid #21262d;
            border-top: 3px solid #0088cc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-weight: 400; font-size: 1.2rem; }
        a { color: #58a6ff; text-decoration: none; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Abriendo aplicación...</h2>
    <p>Si no sucede nada, <a href="#" id="manual-link">toca aquí para entrar</a>.</p>
    <script>
        document.getElementById('manual-link').href = directProtocol;
    </script>
</body>
</html>
